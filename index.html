<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#4f46e5" />
  <title>Toppers Hub Academy</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Toppers Hub" />
  <style>
    :root{
      --bg:#0b1020; --card:#151b30; --card2:#1c2340; --line:#2a3252;
      --text:#eef1fb; --muted:#95a0c4; --brand:#6366f1; --brand2:#8b5cf6;
      --green:#22c55e; --amber:#f59e0b; --red:#ef4444; --sky:#38bdf8;
      --radius:18px; --shadow:0 10px 30px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      overscroll-behavior-y:none}
    body{padding-bottom:calc(78px + env(safe-area-inset-bottom))}
    a{color:var(--sky)}
    .hidden{display:none !important}
    button{font-family:inherit}

    /* Header */
    header{position:sticky;top:0;z-index:20;
      background:linear-gradient(135deg,var(--brand),var(--brand2));
      padding:calc(14px + env(safe-area-inset-top)) 18px 16px;
      border-bottom-left-radius:22px;border-bottom-right-radius:22px;box-shadow:var(--shadow)}
    .brandrow{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .brand{display:flex;align-items:center;gap:11px}
    .logo{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.18);
      display:grid;place-items:center;font-weight:800;font-size:19px;backdrop-filter:blur(6px)}
    .brand h1{font-size:17px;margin:0;line-height:1.1}
    .brand p{margin:1px 0 0;font-size:11.5px;opacity:.9}
    .iconbtn{background:rgba(255,255,255,.18);border:none;color:#fff;width:40px;height:40px;
      border-radius:12px;font-size:17px;display:grid;place-items:center;cursor:pointer}

    main{padding:16px 15px 10px;max-width:760px;margin:0 auto}
    .view{animation:fade .25s ease}
    @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    h2.section{font-size:15px;margin:22px 4px 10px;color:var(--muted);letter-spacing:.3px;text-transform:uppercase;font-weight:700}

    /* Cards */
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
      padding:15px;margin-bottom:12px;box-shadow:var(--shadow)}
    .row{display:flex;align-items:center;gap:12px}
    .grow{flex:1;min-width:0}
    .muted{color:var(--muted)}
    .ellipsis{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    /* Stat tiles */
    .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:11px}
    .stat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px}
    .stat .n{font-size:24px;font-weight:800;margin-top:2px}
    .stat .l{font-size:12px;color:var(--muted)}
    .stat.g{border-color:rgba(34,197,94,.4)} .stat.g .n{color:var(--green)}
    .stat.a{border-color:rgba(245,158,11,.4)} .stat.a .n{color:var(--amber)}
    .stat.r{border-color:rgba(239,68,68,.4)} .stat.r .n{color:var(--red)}
    .stat.b .n{color:var(--sky)}

    /* Pills / badges */
    .badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;
      padding:4px 9px;border-radius:999px;white-space:nowrap}
    .b-green{background:rgba(34,197,94,.15);color:#4ade80}
    .b-amber{background:rgba(245,158,11,.15);color:#fbbf24}
    .b-red{background:rgba(239,68,68,.15);color:#f87171}
    .b-gray{background:rgba(148,160,196,.15);color:var(--muted)}
    .b-sky{background:rgba(56,189,248,.15);color:#7dd3fc}

    .avatar{width:44px;height:44px;border-radius:13px;flex:none;display:grid;place-items:center;
      font-weight:800;font-size:16px;color:#fff;background:linear-gradient(135deg,var(--brand),var(--brand2))}

    /* Buttons */
    .btn{border:none;border-radius:12px;padding:12px 15px;font-size:14px;font-weight:700;
      cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:7px}
    .btn.primary{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff}
    .btn.ghost{background:var(--card2);color:var(--text);border:1px solid var(--line)}
    .btn.wa{background:#22a95a;color:#fff}
    .btn.sm{padding:8px 11px;font-size:12.5px;border-radius:10px}
    .btn.block{width:100%}
    .btn:active{transform:scale(.97)}
    .btnrow{display:flex;gap:8px;flex-wrap:wrap}

    /* Attendance toggle buttons */
    .attbtn{width:34px;height:34px;border-radius:10px;border:1px solid var(--line);background:var(--card2);
      color:var(--muted);font-weight:800;font-size:13px;cursor:pointer;flex:none}
    .attbtn:active{transform:scale(.92)}
    .attbtn.att-p{background:var(--green);border-color:var(--green);color:#04220f}
    .attbtn.att-l{background:var(--amber);border-color:var(--amber);color:#241800}
    .attbtn.att-a{background:var(--red);border-color:var(--red);color:#2a0606}

    /* Search */
    .search{width:100%;background:var(--card);border:1px solid var(--line);border-radius:13px;
      padding:12px 14px;color:var(--text);font-size:14px;margin-bottom:12px}

    /* Forms */
    label.f{display:block;font-size:12.5px;color:var(--muted);margin:12px 2px 5px;font-weight:600}
    .in,select.in,textarea.in{width:100%;background:var(--card2);border:1px solid var(--line);
      border-radius:12px;padding:12px 13px;color:var(--text);font-size:15px}
    textarea.in{min-height:70px;resize:vertical}
    .two{display:grid;grid-template-columns:1fr 1fr;gap:10px}

    /* Bottom nav */
    nav.tabs{position:fixed;left:0;right:0;bottom:0;z-index:30;
      background:rgba(15,20,40,.92);backdrop-filter:blur(14px);border-top:1px solid var(--line);
      display:flex;justify-content:space-around;padding:8px 6px calc(8px + env(safe-area-inset-bottom))}
    nav.tabs button{background:none;border:none;color:var(--muted);font-size:10px;font-weight:600;flex:1;
      display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 4px;border-radius:12px;cursor:pointer}
    nav.tabs button .ic{font-size:20px;line-height:1}
    nav.tabs button.active{color:var(--text)}
    nav.tabs button.active .ic{transform:translateY(-1px)}

    /* Modal */
    .overlay{position:fixed;inset:0;z-index:50;background:rgba(3,6,18,.65);
      display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
    .sheet{background:var(--bg);width:100%;max-width:760px;max-height:92vh;overflow-y:auto;
      border-top-left-radius:24px;border-top-right-radius:24px;border:1px solid var(--line);
      padding:8px 16px calc(24px + env(safe-area-inset-bottom));animation:slideup .28s ease}
    @keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
    .grabber{width:44px;height:5px;border-radius:99px;background:var(--line);margin:8px auto 6px}
    .sheet h3{margin:6px 2px 2px;font-size:19px}
    .sheettop{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}

    .empty{text-align:center;color:var(--muted);padding:40px 20px}
    .empty .big{font-size:40px;margin-bottom:8px}

    .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:96px;z-index:99;
      background:#111830;border:1px solid var(--line);color:#fff;padding:12px 18px;border-radius:14px;
      box-shadow:var(--shadow);font-size:13.5px;opacity:0;transition:opacity .2s,transform .2s}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}

    /* Install button */
    .installfab{position:fixed;right:14px;bottom:calc(90px + env(safe-area-inset-bottom));z-index:40;
      background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;border:none;
      padding:12px 16px;border-radius:14px;font-size:13.5px;font-weight:700;cursor:pointer;
      box-shadow:0 8px 22px rgba(99,102,241,.5);display:flex;align-items:center;animation:fade .3s ease}
    .installfab:active{transform:scale(.96)}

    /* Auth */
    .authwrap{min-height:78vh;display:flex;flex-direction:column;justify-content:center;padding:8px}
    .authlogo{width:66px;height:66px;border-radius:20px;margin:0 auto 14px;display:grid;place-items:center;
      font-size:30px;font-weight:800;color:#fff;background:linear-gradient(135deg,var(--brand),var(--brand2));box-shadow:var(--shadow)}
    .center{text-align:center}
    .link{color:var(--sky);cursor:pointer;font-weight:600}
    .divider{height:1px;background:var(--line);margin:14px 0}
    .listitem{cursor:pointer}
    .kv{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px}
    .kv:last-child{border-bottom:none}
    .kv b{font-weight:700}
    .tag{font-size:11px;color:var(--muted)}
    .banner{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.35);color:#fcd34d;
      padding:10px 13px;border-radius:12px;font-size:12.5px;margin-bottom:12px}
  </style>
</head>
<body>
  <!-- APP HEADER -->
  <header id="appHeader" class="hidden">
    <div class="brandrow">
      <div class="brand">
        <div class="logo">TH</div>
        <div>
          <h1 id="hdrName">Toppers Hub Academy</h1>
          <p id="hdrSub">Fees & students</p>
        </div>
      </div>
      <button class="iconbtn" id="menuBtn" title="Menu">⚙️</button>
    </div>
  </header>

  <main id="app"><!-- rendered by app.js --></main>

  <!-- BOTTOM NAV -->
  <nav class="tabs hidden" id="tabs">
    <button data-view="dashboard" class="active"><span class="ic">🏠</span>Home</button>
    <button data-view="students"><span class="ic">🎓</span>Students</button>
    <button data-view="attendance"><span class="ic">📋</span>Attend</button>
    <button data-view="teachers"><span class="ic">👩‍🏫</span>Teachers</button>
    <button data-view="money"><span class="ic">💰</span>Money</button>
  </nav>

  <button class="installfab hidden" id="installBtn">⬇️&nbsp; Install app</button>

  <div id="modalRoot"></div>
  <div class="toast" id="toast"></div>

  <!-- Supabase client (loaded from CDN; cached for offline by the service worker) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- jsPDF for shareable payment receipts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
    }
  </script>
</body>
</html>
